# Trigger heartbeat — catches a TOTAL QStash non-trigger, the one failure mode
# nothing else covers: GitHub's built-in failure email only fires when a run
# exists and fails; if QStash silently stops dispatching (expired token, deleted
# schedule, account issue), no run exists, so nobody is notified and the channel
# just goes dark (exactly how the old Cloudflare Worker trigger died).
#
# How it works: on each publish day (Mon/Wed/Fri), a few hours after the 13:00
# UTC QStash dispatch, check whether ANY "Daily video" run was created today.
# None → this job fails → GitHub's built-in failure notification emails the
# repo owner. A run that was triggered but FAILED is deliberately a PASS here —
# the daily workflow's own failure email already covers that case.
#
# GitHub `schedule:` crons can fire hours late under load (the reason daily.yml
# moved to QStash), but late is fine for a heartbeat: the check is "did today's
# run get created", which stays valid any time before midnight UTC.
#
# NOTE: GitHub auto-disables scheduled workflows after 60 days without repo
# activity — pushes happen often enough here, but if the repo ever goes
# dormant, re-enable this workflow under the Actions tab.
name: Trigger heartbeat

on:
  schedule:
    # 16:00 UTC Mon/Wed/Fri = 3h after the QStash dispatch (the daily run takes
    # ~80min, but only run *creation* matters here, not completion).
    - cron: '0 16 * * 1,3,5'
  workflow_dispatch: {}

permissions:
  actions: read

jobs:
  check-todays-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify a Daily video run was created today
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          today=$(date -u +%F)
          count=$(gh api -X GET \
            "/repos/${{ github.repository }}/actions/workflows/daily.yml/runs" \
            -f per_page=20 \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"$today\"))] | length")
          echo "Daily video runs created $today: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::No Daily video run was created today ($today) — QStash likely failed to dispatch. Manual fallback: gh workflow run \"Daily video\" --ref main"
            exit 1
          fi
