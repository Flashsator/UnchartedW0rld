name: Daily video

on:
  # PRIMARY scheduling is the Cloudflare Worker in cloudflare-trigger/, which
  # fires workflow_dispatch at 13:00 UTC (sub-minute jitter) for punctual
  # ~21:00 Taiwan publishing.
  #
  # BACKUP: GitHub's own schedule cron below. It was originally removed because
  # it lands hours late under peak load — but on 2026-06-06 the CF cron silently
  # failed to fire at all (no invocation on either side), which is far worse than
  # being late. So GitHub cron is back purely as a safety net, offset to 15:30 UTC
  # so the CF run (13:00, <=88min) has finished and recorded the daily upload lock
  # first. On a normal day the lock (cached in work/.last-upload-date) + the
  # `daily-video` concurrency group make this backup exit early before any render,
  # so it only ever publishes when the CF trigger missed entirely.
  schedule:
    - cron: '30 15 * * 1,3,6'  # Mon/Wed/Sat 15:30 UTC — backup only; see note above
  workflow_dispatch:
    inputs:
      series_key:
        description: 'Force a specific series for trending-event injection (nature, insects, cosmos, ocean, animals, body, history). Leave blank for normal rotation.'
        required: false
        type: string
      sub_theme:
        description: 'Force a specific sub-topic prompt. Leave blank to pick at random from the chosen series.'
        required: false
        type: string
      structure_key:
        description: 'Force a script structure (concept_twist, investigative_case_file, expedition_narrative, layered_explainer, profile_protagonist). Leave blank for random.'
        required: false
        type: string
      dry_run:
        description: 'Build but skip YouTube upload'
        required: false
        type: boolean
        default: false
      force:
        description: 'Bypass the daily upload lock (publish even if a long-form already went out today)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Rendering a ~10-min Remotion video with b-roll on a 2-vCPU runner is slow
    # (the 60-min cap used to kill it mid-render). Public repo → standard-runner
    # minutes are free, so allow ample headroom. Script-gen has its own 20-min
    # internal cap, so a runaway here can only be a slow render, not a hang.
    timeout-minutes: 240
    concurrency:
      group: daily-video
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      # The render step (Remotion + Chromium) needs lots of scratch space for
      # downloaded b-roll mp4s and frame output. ubuntu-latest ships only ~14 GB
      # free on /, which the b-roll + deps exhausted mid-render ("Chrome rejecting
      # the request because the disk space is low"). Drop preinstalled toolchains
      # we never use to reclaim ~25-30 GB before anything downloads. Quality of the
      # video is untouched — this only removes unrelated SDKs from the runner image.
      - name: Free up disk space
        run: |
          echo "Disk before cleanup:"; df -h /
          sudo rm -rf /usr/local/lib/android       # ~9 GB Android SDK/NDK
          sudo rm -rf /usr/share/dotnet            # ~1.6 GB .NET
          sudo rm -rf /opt/ghc /usr/local/.ghcup   # ~6 GB Haskell
          sudo rm -rf /usr/local/share/boost       # ~1 GB Boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL  # ~6 GB CodeQL
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"      # leftover toolcache
          sudo docker image prune --all --force || true
          sudo apt-get clean
          echo "Disk after cleanup:"; df -h /

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system deps (ffmpeg, fonts, Chromium libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-color-emoji \
            fonts-liberation \
            libnss3 libatk-bridge2.0-0 libgtk-3-0 libxkbcommon0 \
            libasound2t64 libxshmfence1 libgbm1

      - name: Install npm deps
        run: npm ci

      # Script generation runs Claude Code headless (`claude -p`). The runner has
      # no claude binary by default, so install it and authenticate via the
      # subscription OAuth token (generated locally with `claude setup-token`).
      - name: Install Claude Code CLI
        run: npm i -g @anthropic-ai/claude-code

      - name: Install Remotion Chromium
        run: npx remotion browser ensure

      - name: Install Playwright Chromium (for music scraper)
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Refresh Pixabay music library
        continue-on-error: true
        run: npm run scrape:music

      # Anti-repeat rotation state (tone / thumbnail layout / BGM) lives in work/.
      # Runners are ephemeral, so without this the variety logic resets every run.
      # Rolling key: unique per run (always saves a fresh snapshot in the post step),
      # restore-keys grabs the most recent prior snapshot.
      - name: Restore rotation state
        uses: actions/cache@v4
        with:
          path: |
            work/.last-tone
            work/.last-thumb-layout
            work/.last-bgm
            work/.last-upload-date
          key: rotation-state-${{ github.run_id }}
          restore-keys: |
            rotation-state-

      # First-run headless Claude Code blocks forever on the folder-trust /
      # onboarding prompt (it reads /dev/tty directly, so stdout/stderr stay
      # empty and the job just hangs until timeout). Pre-seed ~/.claude.json so
      # the workspace is already trusted and onboarding is marked complete.
      - name: Pre-trust workspace for headless Claude Code
        run: |
          node -e '
            const fs = require("fs"), os = require("os"), path = require("path");
            const f = path.join(os.homedir(), ".claude.json");
            let c = {};
            try { c = JSON.parse(fs.readFileSync(f, "utf8")); } catch {}
            c.hasCompletedOnboarding = true;
            c.projects = c.projects || {};
            const cwd = process.env.GITHUB_WORKSPACE || process.cwd();
            c.projects[cwd] = { ...(c.projects[cwd] || {}), hasTrustDialogAccepted: true, allowedTools: [] };
            fs.writeFileSync(f, JSON.stringify(c));
            console.log("Pre-trusted workspace:", cwd);
          '

      - name: Run pipeline
        env:
          # Headless Claude Code auth via subscription token (no API billing).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Required: narration TTS. Without these the run fails at the TTS stage.
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # Optional extra b-roll sources (disabled gracefully if unset).
          COVERR_API_KEY: ${{ secrets.COVERR_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # Thumbnail background via Cloudflare FLUX.2 [klein]; falls back to
          # Unsplash then a gradient if these are unset.
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
          SERIES_KEY: ${{ inputs.series_key }}
          SUB_THEME: ${{ inputs.sub_theme }}
          STRUCTURE_KEY: ${{ inputs.structure_key }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          FORCE_RUN: ${{ inputs.force && '1' || '' }}
        run: npm run run

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: |
            work/
            out/
          retention-days: 3
